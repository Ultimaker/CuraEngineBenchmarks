<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, minimum-scale=1.0, initial-scale=1, user-scalable=yes" />
    <style>
      html {
        font-family: BlinkMacSystemFont,-apple-system,"Segoe UI",Roboto,Oxygen,Ubuntu,Cantarell,"Fira Sans","Droid Sans","Helvetica Neue",Helvetica,Arial,sans-serif;
        -webkit-font-smoothing: antialiased;
        background-color: #fff;
        font-size: 16px;
      }
      body {
        color: #4a4a4a;
        margin: 8px;
        font-size: 1em;
        font-weight: 400;
      }
      h1 {
        text-align: center;
        font-size: 2.5rem;
        font-weight: 600;
        margin: 32px 0 24px;
      }
      ul {
        list-style: none;
        padding: 0;
        margin: 0 auto;
        max-width: 480px;
      }
      li {
        margin: 12px 0;
      }
      a {
        display: block;
        padding: 14px 20px;
        background-color: #f5f5f5;
        border: 1px solid #dbdbdb;
        border-radius: 4px;
        color: #3273dc;
        text-decoration: none;
        font-size: 1.1rem;
      }
      a:hover {
        background-color: #eef3fb;
        border-color: #3273dc;
        color: #000;
      }
    </style>
    <title>CuraEngine Benchmarks</title>
  </head>
  <body>
    <h1>CuraEngine Benchmarks</h1>
    <ul id="list"></ul>

    <script>
      'use strict';
      (function () {
        var list = document.getElementById('list');

        function render(folders) {
          list.innerHTML = '';
          if (folders.length === 0) {
            var li = document.createElement('li');
            li.textContent = 'No benchmarks found.';
            list.appendChild(li);
            return;
          }
          folders.forEach(function (name) {
            var li = document.createElement('li');
            var a = document.createElement('a');
            a.href = name + '/';
            a.textContent = name;
            li.appendChild(a);
            list.appendChild(li);
          });
        }

        fetch('https://api.github.com/repos/Ultimaker/CuraEngineBenchmarks/contents/dev?ref=main')
          .then(function (r) { return r.json(); })
          .then(function (items) {
            var dirs = items
              .filter(function (item) { return item.type === 'dir'; })
              .map(function (item) { return item.name; });
            render(dirs);
          })
          .catch(function () {
            list.innerHTML = '<li>Failed to load benchmark list.</li>';
          });
      })();
    </script>
  </body>
</html>
